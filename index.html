<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CoordinatePicker</title>

  <!-- Modus WC 2.0 -->
  <link rel="stylesheet" href="https://unpkg.com/@trimble-oss/moduswebcomponents@latest/modus-wc-styles.css">
  <script type="module">
    import { defineCustomElements } from 'https://unpkg.com/@trimble-oss/moduswebcomponents/loader/index.js';
    defineCustomElements();
  </script>

  <!-- Trimble Connect Workspace API -->
  <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 1rem;
      font-family: 'Open Sans', sans-serif;
      font-size: 14px;
      color: #252a2e;
      background: #fff;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    h1 { font-size: 1.1rem; font-weight: 600; margin: 0; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 0.8rem;
      font-weight: 600;
    }
    .badge.ok  { background: #e8f5e9; color: #2e7d32; }
    .badge.err { background: #fce4ec; color: #c62828; }
    .badge::before {
      content: '';
      width: 7px; height: 7px;
      border-radius: 50%;
      background: currentColor;
    }

    .toolbar {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      margin-bottom: 0.75rem;
    }

    .count {
      font-size: 0.8rem;
      color: #6a6e79;
      margin-left: auto;
    }

    /* Resizable table */
    .table-wrap {
      overflow-x: auto;
      width: 100%;
    }

    .coord-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
      table-layout: fixed;
    }

    .coord-table th {
      position: relative;
      text-align: left;
      font-weight: 600;
      color: #6a6e79;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: .04em;
      padding: 0.3rem 0.5rem;
      border-bottom: 2px solid #e0e1e9;
      white-space: nowrap;
      overflow: hidden;
      user-select: none;
    }

    /* Column resize handle */
    .col-resizer {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 5px;
      cursor: col-resize;
      background: transparent;
    }
    .col-resizer:hover,
    .col-resizer.active { background: #0063a3; }

    .coord-table td {
      padding: 0.35rem 0.5rem;
      border-bottom: 1px solid #f0f0f5;
      font-variant-numeric: tabular-nums;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .coord-table tr:hover td { background: #f4f5f7; }
    .coord-table .num { text-align: right; }

    /* Fixed widths for columns */
    .col-idx   { width: 36px; }
    .col-coord { width: 120px; }
    .col-copy  { width: 32px; }

    .empty {
      text-align: center;
      padding: 2rem;
      color: #6a6e79;
      font-size: 0.85rem;
    }

    .copy-btn {
      cursor: pointer;
      background: none;
      border: none;
      padding: 2px 4px;
      color: #0063a3;
      font-size: 0.75rem;
      border-radius: 2px;
    }
    .copy-btn:hover { background: #e8f0fb; }

    .log {
      margin-top: 0.75rem;
      background: #f4f5f7;
      border-radius: 4px;
      padding: 0.5rem 0.75rem;
      font-family: monospace;
      font-size: 0.78rem;
      max-height: 100px;
      overflow-y: auto;
    }
    .log .e     { color: #252a2e; margin-bottom: 2px; }
    .log .e.err { color: #c62828; }
  </style>
</head>
<body>

<header>
  <h1>CoordinatePicker</h1>
  <span id="badge" class="badge err">Not connected</span>
</header>

<div class="toolbar" id="toolbar" hidden>
  <modus-wc-button id="btnFetch" color="primary" size="sm">Fetch points</modus-wc-button>
  <modus-wc-button id="btnCopyAll" color="secondary" size="sm">Copy all (CSV)</modus-wc-button>
  <span class="count" id="countLabel"></span>
</div>

<div class="table-wrap">
  <div class="empty" id="emptyMsg" hidden>No points found. Create "Single point" measurements in TC and fetch again.</div>
  <table class="coord-table" id="coordTable" hidden>
    <colgroup>
      <col class="col-idx">
      <col class="col-coord" id="colX">
      <col class="col-coord" id="colY">
      <col class="col-coord" id="colZ">
      <col class="col-copy">
    </colgroup>
    <thead>
      <tr>
        <th>#</th>
        <th class="num">X<span class="col-resizer" data-col="colX"></span></th>
        <th class="num">Y<span class="col-resizer" data-col="colY"></span></th>
        <th class="num">Z<span class="col-resizer" data-col="colZ"></span></th>
        <th></th>
      </tr>
    </thead>
    <tbody id="coordBody"></tbody>
  </table>
</div>

<div class="log" id="log"></div>

<script>
  let API = null;
  let points = [];

  // --- Logging ---
  function log(msg, cls = '') {
    const el = document.getElementById('log');
    const d = document.createElement('div');
    d.className = 'e' + (cls ? ' ' + cls : '');
    d.textContent = `[${new Date().toLocaleTimeString('en-GB')}] ${msg}`;
    el.appendChild(d);
    el.scrollTop = el.scrollHeight;
  }

  // --- Connection ---
  function setConnected(ok) {
    const badge = document.getElementById('badge');
    badge.textContent = ok ? 'Connected' : 'Not connected';
    badge.className = 'badge ' + (ok ? 'ok' : 'err');
    document.getElementById('toolbar').hidden = !ok;
  }

  // --- Format mm → m ---
  function fmt(mm) {
    return (mm / 1000).toFixed(3);
  }

  // --- Render table ---
  function renderTable(pts) {
    points = pts;
    const body  = document.getElementById('coordBody');
    const table = document.getElementById('coordTable');
    const empty = document.getElementById('emptyMsg');
    const count = document.getElementById('countLabel');

    body.innerHTML = '';

    if (!pts.length) {
      table.hidden = true;
      empty.hidden = false;
      count.textContent = '0 points';
      return;
    }

    table.hidden = false;
    empty.hidden = true;
    count.textContent = `${pts.length} point${pts.length !== 1 ? 's' : ''}`;

    pts.forEach((p, i) => {
      const pick = p.start;
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${i + 1}</td>
        <td class="num">${fmt(pick.positionX)}</td>
        <td class="num">${fmt(pick.positionY)}</td>
        <td class="num">${fmt(pick.positionZ)}</td>
        <td><button class="copy-btn" title="Copy row" data-i="${i}">⎘</button></td>
      `;
      body.appendChild(tr);
    });

    body.querySelectorAll('.copy-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const i = +btn.dataset.i;
        const pick = points[i].start;
        const line = `${fmt(pick.positionX)};${fmt(pick.positionY)};${fmt(pick.positionZ)}`;
        navigator.clipboard.writeText(line).then(() => log(`Copied point ${i + 1}`));
      });
    });
  }

  // --- Fetch ---
  async function fetchPoints() {
    log('Fetching single point measurements...');
    try {
      const result = await API.markup.getSinglePointMarkups();
      log(`Found ${result.length} point(s)`);
      renderTable(result);
    } catch (e) {
      log(`Error: ${e?.message ?? e}`, 'err');
    }
  }

  // --- Copy CSV ---
  function copyAllCsv() {
    if (!points.length) { log('No points to copy'); return; }
    const header = 'X_m;Y_m;Z_m';
    const rows = points.map(p => {
      const pick = p.start;
      return `${fmt(pick.positionX)};${fmt(pick.positionY)};${fmt(pick.positionZ)}`;
    });
    navigator.clipboard.writeText([header, ...rows].join('\n'))
      .then(() => log(`Copied ${points.length} points as CSV`));
  }

  // --- Column resize ---
  function initResizableColumns() {
    document.querySelectorAll('.col-resizer').forEach(handle => {
      let startX, startW, col;

      handle.addEventListener('mousedown', e => {
        col = document.getElementById(handle.dataset.col);
        startX = e.pageX;
        startW = col.offsetWidth;
        handle.classList.add('active');

        const onMove = e => {
          const w = Math.max(60, startW + (e.pageX - startX));
          col.style.width = w + 'px';
        };
        const onUp = () => {
          handle.classList.remove('active');
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
        };
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
        e.preventDefault();
      });
    });
  }

  // --- TC connect ---
  function inIframe() {
    try { return window.self !== window.top; } catch { return true; }
  }

  async function connect() {
    log('Connecting to Trimble Connect...');
    try {
      API = await TrimbleConnectWorkspace.connect(window.parent, (event) => {
        if (event === 'markup.onChanged') fetchPoints();
      });
      log('Connected!');
      setConnected(true);
    } catch (err) {
      log(`Connection error: ${err?.message ?? err}`, 'err');
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('btnFetch').addEventListener('click', fetchPoints);
    document.getElementById('btnCopyAll').addEventListener('click', copyAllCsv);
    initResizableColumns();
  });

  if (inIframe()) {
    connect();
  } else {
    log('Running outside Trimble Connect — open the extension from within TC to test');
  }
</script>
</body>
</html>
